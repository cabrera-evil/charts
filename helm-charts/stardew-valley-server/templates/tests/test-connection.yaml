apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "stardew-valley-server.fullname" . }}-test-connection"
  labels:
    {{- include "stardew-valley-server.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: nc-test
      image: busybox
      command:
        - sh
        - -c
        - |
          # Test UDP port is accessible (basic connectivity)
          nc -uz {{ include "stardew-valley-server.fullname" . }} {{ .Values.service.gamePort }}
          if [ $? -eq 0 ]; then
            echo "SUCCESS: Game port {{ .Values.service.gamePort }}/UDP is accessible"
            exit 0
          else
            echo "FAILED: Cannot reach game port {{ .Values.service.gamePort }}/UDP"
            exit 1
          fi
  restartPolicy: Never
