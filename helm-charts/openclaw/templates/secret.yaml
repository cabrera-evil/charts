{{- if .Values.secret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw.fullname" . }}-secret
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{/* --- Gateway auth --- */}}
  {{- if .Values.secret.gatewayToken }}
  OPENCLAW_GATEWAY_TOKEN: {{ .Values.secret.gatewayToken | quote }}
  {{- end }}
  {{- if .Values.secret.gatewayPassword }}
  OPENCLAW_GATEWAY_PASSWORD: {{ .Values.secret.gatewayPassword | quote }}
  {{- end }}

  {{/* --- Model providers (core) --- */}}
  {{- if .Values.secret.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secret.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.geminiApiKey }}
  GEMINI_API_KEY: {{ .Values.secret.geminiApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secret.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.openrouterApiKey }}
  OPENROUTER_API_KEY: {{ .Values.secret.openrouterApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.googleApiKey }}
  GOOGLE_API_KEY: {{ .Values.secret.googleApiKey | quote }}
  {{- end }}

  {{/* --- Live keys --- */}}
  {{- if .Values.secret.openaiLiveKey }}
  OPENCLAW_LIVE_OPENAI_KEY: {{ .Values.secret.openaiLiveKey | quote }}
  {{- end }}
  {{- if .Values.secret.anthropicLiveKey }}
  OPENCLAW_LIVE_ANTHROPIC_KEY: {{ .Values.secret.anthropicLiveKey | quote }}
  {{- end }}
  {{- if .Values.secret.geminiLiveKey }}
  OPENCLAW_LIVE_GEMINI_KEY: {{ .Values.secret.geminiLiveKey | quote }}
  {{- end }}

  {{/* --- Numbered / pooled variants --- */}}
  {{- if .Values.secret.openaiApiKey1 }}
  OPENAI_API_KEY_1: {{ .Values.secret.openaiApiKey1 | quote }}
  {{- end }}
  {{- if .Values.secret.anthropicApiKey1 }}
  ANTHROPIC_API_KEY_1: {{ .Values.secret.anthropicApiKey1 | quote }}
  {{- end }}
  {{- if .Values.secret.geminiApiKey1 }}
  GEMINI_API_KEY_1: {{ .Values.secret.geminiApiKey1 | quote }}
  {{- end }}
  {{- if .Values.secret.openaiApiKeys }}
  OPENAI_API_KEYS: {{ .Values.secret.openaiApiKeys | quote }}
  {{- end }}
  {{- if .Values.secret.anthropicApiKeys }}
  ANTHROPIC_API_KEYS: {{ .Values.secret.anthropicApiKeys | quote }}
  {{- end }}
  {{- if .Values.secret.geminiApiKeys }}
  GEMINI_API_KEYS: {{ .Values.secret.geminiApiKeys | quote }}
  {{- end }}

  {{/* --- Additional providers --- */}}
  {{- if .Values.secret.zaiApiKey }}
  ZAI_API_KEY: {{ .Values.secret.zaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.aiGatewayApiKey }}
  AI_GATEWAY_API_KEY: {{ .Values.secret.aiGatewayApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.tokenhubApiKey }}
  TOKENHUB_API_KEY: {{ .Values.secret.tokenhubApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.lkeapApiKey }}
  LKEAP_API_KEY: {{ .Values.secret.lkeapApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.minimaxApiKey }}
  MINIMAX_API_KEY: {{ .Values.secret.minimaxApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.syntheticApiKey }}
  SYNTHETIC_API_KEY: {{ .Values.secret.syntheticApiKey | quote }}
  {{- end }}

  {{/* --- Channels --- */}}
  {{- if .Values.secret.telegramBotToken }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secret.telegramBotToken | quote }}
  {{- end }}
  {{- if .Values.secret.discordBotToken }}
  DISCORD_BOT_TOKEN: {{ .Values.secret.discordBotToken | quote }}
  {{- end }}
  {{- if .Values.secret.slackBotToken }}
  SLACK_BOT_TOKEN: {{ .Values.secret.slackBotToken | quote }}
  {{- end }}
  {{- if .Values.secret.slackAppToken }}
  SLACK_APP_TOKEN: {{ .Values.secret.slackAppToken | quote }}
  {{- end }}
  {{- if .Values.secret.mattermostBotToken }}
  MATTERMOST_BOT_TOKEN: {{ .Values.secret.mattermostBotToken | quote }}
  {{- end }}
  {{- if .Values.secret.mattermostUrl }}
  MATTERMOST_URL: {{ .Values.secret.mattermostUrl | quote }}
  {{- end }}
  {{- if .Values.secret.zaloBotToken }}
  ZALO_BOT_TOKEN: {{ .Values.secret.zaloBotToken | quote }}
  {{- end }}
  {{- if .Values.secret.twitchAccessToken }}
  OPENCLAW_TWITCH_ACCESS_TOKEN: {{ .Values.secret.twitchAccessToken | quote }}
  {{- end }}

  {{/* --- Tools / search --- */}}
  {{- if .Values.secret.braveApiKey }}
  BRAVE_API_KEY: {{ .Values.secret.braveApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.perplexityApiKey }}
  PERPLEXITY_API_KEY: {{ .Values.secret.perplexityApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.firecrawlApiKey }}
  FIRECRAWL_API_KEY: {{ .Values.secret.firecrawlApiKey | quote }}
  {{- end }}

  {{/* --- Voice / media --- */}}
  {{- if .Values.secret.elevenlabsApiKey }}
  ELEVENLABS_API_KEY: {{ .Values.secret.elevenlabsApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.xiApiKey }}
  XI_API_KEY: {{ .Values.secret.xiApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.inworldApiKey }}
  INWORLD_API_KEY: {{ .Values.secret.inworldApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.deepgramApiKey }}
  DEEPGRAM_API_KEY: {{ .Values.secret.deepgramApiKey | quote }}
  {{- end }}
{{- end }}
